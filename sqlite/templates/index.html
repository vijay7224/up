
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>
<style>
:root {
    --user-color: #1a73e8;
    --bot-color: #e5e5ea;
    --background: #202124;
    --text-color: #e8eaed;
}
body {
    margin:0; font-family:'Segoe UI', sans-serif; background:var(--background); color:var(--text-color);
    display:flex; justify-content:center; align-items:center; height:100vh;
}
.chat-container {
    display:flex; flex-direction:column; width:400px; max-width:90%; height:600px; background:#303134;
    border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
#chat-box {
    flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column;
}
.message {
    max-width:75%; margin:5px 0; padding:10px; border-radius:12px; word-wrap:break-word;
}
.user-msg { align-self:flex-end; background: var(--user-color); color:white; border-bottom-right-radius:0; }
.bot-msg { align-self:flex-start; background: var(--bot-color); color:black; border-bottom-left-radius:0; }
#chat-form { display:flex; border-top:1px solid #5f6368; padding:10px; background:#303134; }
#user-input { flex:1; padding:10px; border-radius:8px; border:none; outline:none; background:#3c4043; color:white; }
button { padding:10px 16px; margin-left:5px; border-radius:8px; border:none; background:#1a73e8; color:white; cursor:pointer; }
.typing { font-style:italic; color:#ccc; margin:5px 0; }
h1 { text-align:center; margin:10px 0; color:white; }
</style>
</head>
<body>
<div class="chat-container">
    <h1>AI Chatbot</h1>
    <div id="chat-box"></div>
    <form id="chat-form">
        <input type="text" id="user-input" placeholder="Type a message..." required>
        <button type="submit">Send</button>
    </form>
    <button onclick="startDictation()">🎤 Speak</button>
</div>

<script>
const form = document.getElementById("chat-form");
const chatBox = document.getElementById("chat-box");

form.addEventListener("submit", async (e)=>{
    e.preventDefault();
    const message = document.getElementById("user-input").value;
    addMessage("user", message);
    document.getElementById("user-input").value = "";
    addMessage("bot", "Typing...", true);

    try {
        const res = await fetch("/chat", {
            method:"POST",
            body:new URLSearchParams({message}),
        });
        const data = await res.json();
        updateBotMessage(data.reply);
        speak(data.reply);
    } catch(err){
        updateBotMessage("Error: " + err);
    }
});

function addMessage(sender, text, typing=false){
    const msgDiv = document.createElement("div");
    msgDiv.classList.add("message");
    msgDiv.classList.add(sender+"-msg");
    msgDiv.textContent = text;
    if(typing) msgDiv.classList.add("typing");
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function updateBotMessage(text){
    const typingDiv = document.querySelector(".bot-msg.typing");
    if(typingDiv) typingDiv.remove();
    addMessage("bot", text);
}

function speak(text){
    const utter = new SpeechSynthesisUtterance(text);
    window.speechSynthesis.speak(utter);
}

function startDictation() {
    if (window.hasOwnProperty('webkitSpeechRecognition')) {
        var recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = "en-US";
        recognition.start();
        recognition.onresult = function(e) {
            document.getElementById('user-input').value = e.results[0][0].transcript;
            recognition.stop();
        };
        recognition.onerror = function(e) { recognition.stop(); }
    } else {
        alert("Speech Recognition not supported in this browser.");
    }
}
</script>
</body>
</html>
