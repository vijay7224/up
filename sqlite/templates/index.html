!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Combo Chatbot</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4e73df,#1cc88a);
    transition:0.3s;
}

.dark{
    background:#121212;
}

.chat-container{
    width:420px;
    max-width:95%;
    height:600px;
    background:white;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    overflow:hidden;
    transition:0.3s;
}

.dark .chat-container{
    background:#1e1e1e;
    color:white;
}

.chat-header{
    padding:15px;
    background:#4e73df;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.toggle-btn{
    background:white;
    border:none;
    padding:5px 10px;
    border-radius:20px;
    cursor:pointer;
}

.chat-box{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.message{
    max-width:75%;
    padding:10px 15px;
    margin-bottom:10px;
    border-radius:20px;
    animation:fadeIn 0.3s ease-in-out;
}

.user{
    background:#4e73df;
    color:white;
    align-self:flex-end;
}

.bot{
    background:#e4e6eb;
    color:black;
    align-self:flex-start;
}

.dark .bot{
    background:#333;
    color:white;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

.chat-input{
    display:flex;
    padding:10px;
    border-top:1px solid #ccc;
}

.chat-input input{
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
    outline:none;
}

.chat-input button{
    margin-left:5px;
    padding:10px 12px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    font-size:16px;
}

.send-btn{background:#1cc88a;color:white;}
.mic-btn{background:#ff4d4d;color:white;}
</style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        🤖 AI Voice Chatbot
        <button class="toggle-btn" onclick="toggleDark()">🌙</button>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type or speak...">
        <button class="mic-btn" onclick="startListening()">🎤</button>
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
function toggleDark(){
    document.body.classList.toggle("dark");
}

function addMessage(text,className){
    const div=document.createElement("div");
    div.classList.add("message",className);
    div.innerText=text;
    document.getElementById("chatBox").appendChild(div);
    document.getElementById("chatBox").scrollTop=9999;
    return div;
}

function sendMessage(){
    let input=document.getElementById("userInput");
    let message=input.value.trim();
    if(message==="") return;

    addMessage(message,"user");
    input.value="";

    fetch("/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:message})
    })
    .then(res=>res.json())
    .then(data=>{
        addMessage(data.reply,"bot");
        speak(data.reply);
    })
    .catch(()=>{
        addMessage("Server Error","bot");
    });
}

/* 🎤 Voice Input (Browser STT) */
function startListening(){
    if(!('webkitSpeechRecognition' in window)){
        alert("Speech Recognition not supported");
        return;
    }

    let recognition=new webkitSpeechRecognition();
    recognition.lang="hi-IN";
    recognition.start();

    recognition.onresult=function(event){
        let speechResult=event.results[0][0].transcript;
        document.getElementById("userInput").value=speechResult;
        sendMessage();
    };
}

/* 🔊 Voice Output */
function speak(text){
    let speech=new SpeechSynthesisUtterance(text);
    speech.lang="hi-IN";
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
